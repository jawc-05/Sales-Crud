<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<f:view>
    <h:head>
        <title>Cadastro de Clientes - SalesCrud</title>
        <style>
            .container { padding: 20px; }
            .panel-form { margin-bottom: 20px; }
            .centered-grid { margin: 0 auto; }
            th, td { text-align: center !important; }
        </style>
    </h:head>

    <h:body>
        <p:growl id="growl" showDetail="true" sticky="false" life="3000" />

        <h:form id="menuForm">
            <p:menubar>
                <p:submenu label="Cadastro" icon="pi pi-fw pi-user">
                    <p:menuitem value="Cliente" icon="pi pi-fw pi-user-plus" url="client.xhtml"/>
                    <p:menuitem value="Produto" icon="pi pi-fw pi-inbox" url="#"/>
                </p:submenu>
                <p:submenu label="Vendas" icon="pi pi-fw pi-shopping-cart">
                    <p:menuitem value="Nova Venda" icon="pi pi-fw pi-plus" url="#"/>
                </p:submenu>
            </p:menubar>
        </h:form>

        <div class="container">

            <h:form id="addForm">
                <p:panel header="#{clientController.isUpdate ? 'Editar Cliente' : 'Novo Cliente'}" styleClass="panel-form">
                    <h:panelGrid columns="3" cellpadding="7" styleClass="centered-grid">

                        <p:outputLabel for="name" value="Nome:" />
                        <p:inputText id="name" value="#{clientController.client.name}" required="true" size="40" />
                        <p:message for="name" />

                        <p:outputLabel for="cpf" value="CPF:" />
                        <p:inputMask id="cpf" value="#{clientController.cpfMask}"
                                     mask="999.999.999-99" required="true"
                                     disabled="#{clientController.isUpdate}" />
                        <p:message for="cpf" />

                        <p:outputLabel for="tel" value="Telefone:" />
                        <p:inputMask id="tel" value="#{clientController.telMask}"
                                     mask="(99) 99999-9999" required="true" />
                        <p:message for="tel" />

                        <p:outputLabel for="address" value="Endereço:" />
                        <p:inputText id="address" value="#{clientController.client.address}" required="true" size="40" />
                        <p:message for="address" />

                        <p:outputLabel for="num" value="Número:" />
                        <p:inputText id="num" value="#{clientController.client.num}" required="true">
                            <p:keyFilter mask="num" />
                        </p:inputText>
                        <p:message for="num" />

                        <p:outputLabel for="city" value="Cidade:" />
                        <p:inputText id="city" value="#{clientController.client.city}" required="true" />
                        <p:message for="city" />

                        <p:outputLabel for="state" value="Estado:" />
                        <p:inputText id="state" value="#{clientController.client.state}" required="true" />
                        <p:message for="state" />

                    </h:panelGrid>

                    <f:facet name="footer">
                        <div style="text-align: center">
                            <p:commandButton value="Cadastrar" action="#{clientController.add}"
                                             update="@form :listForm:tableClients growl"
                                             rendered="#{!clientController.isUpdate}"
                                             icon="pi pi-check" />

                            <p:commandButton value="Atualizar" action="#{clientController.update}"
                                             update="@form :listForm:tableClients growl"
                                             rendered="#{clientController.isUpdate}"
                                             icon="pi pi-refresh" styleClass="ui-button-success" />

                            <p:commandButton value="Cancelar" action="#{clientController.cancel}"
                                             update="@form" immediate="true"
                                             icon="pi pi-times" styleClass="ui-button-secondary" style="margin-left: 10px">
                                <p:resetInput target="addForm" />
                            </p:commandButton>
                        </div>
                    </f:facet>
                </p:panel>
            </h:form>

            <h:form id="listForm">
                <p:dataTable id="tableClients" var="c" value="#{clientController.clients}"
                             rows="10" paginator="true" emptyMessage="Nenhum cliente encontrado">

                    <f:facet name="header">Lista de Clientes</f:facet>

                    <p:column headerText="ID" width="50">
                        <h:outputText value="#{c.id}" />
                    </p:column>

                    <p:column headerText="Nome">
                        <h:outputText value="#{c.name}" />
                    </p:column>

                    <p:column headerText="CPF">
                        <h:outputText value="#{c.cpf}" />
                    </p:column>

                    <p:column headerText="Telefone">
                        <h:outputText value="#{c.tel}" />
                    </p:column>

                    <p:column headerText="Cidade/UF">
                        <h:outputText value="#{c.city} - #{c.state}" />
                    </p:column>

                    <p:column headerText="Ações" width="150">
                        <p:commandButton icon="pi pi-pencil" action="#{clientController.edit(c)}"
                                         update=":addForm" process="@this"
                                         styleClass="ui-button-warning" style="margin-right: 5px" />

                        <p:commandButton icon="pi pi-trash" action="#{clientController.delete(c)}"
                                         update="tableClients :growl" process="@this"
                                         styleClass="ui-button-danger">
                            <p:confirm header="Confirmação" message="Excluir o cliente #{c.name}?" icon="pi pi-exclamation-triangle" />
                        </p:commandButton>
                    </p:column>
                </p:dataTable>

                <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
                    <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
                    <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" />
                </p:confirmDialog>
            </h:form>

        </div>
    </h:body>
</f:view>
</html>
